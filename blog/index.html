  *{margin:0;padding:0;box-sizing:border-box}

  .wrap{max-width:1080px;margin:0 auto;padding:0 20px 60px;position:relative}

  .bloghero{padding:30px 4px 14px}

  .bloghero h1{font-size:30px;font-weight:800;letter-spacing:-.5px}
  .bloghero p{color:var(--sub);margin-top:8px;font-size:15px;max-width:640px}
  /* ---- ad slot ---- */

  .ad-slot .adlabel{font-size:11px;color:#aab2c5;font-weight:600;letter-spacing:.08em}
  /* ---- post list ---- */
  .postlist{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px}
  @media(max-width:760px){.postlist{grid-template-columns:1fr}}
  .postcard{display:flex;flex-direction:column;background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:22px 24px;text-decoration:none;transition:transform .12s ease,box-shadow .12s ease}

  .postcard .tag{align-self:flex-start;font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:99px;background:#eef0ff;color:var(--indigo);margin-bottom:12px}
  .postcard h2{font-size:18px;font-weight:800;letter-spacing:-.3px;line-height:1.4}
  .postcard .excerpt{color:var(--sub);font-size:14px;margin-top:8px;flex:1}
  .postcard .meta{color:#aab2c5;font-size:12.5px;font-weight:600;margin-top:16px}
  .empty{background:#fff;border:1px dashed var(--line);border-radius:18px;padding:40px;text-align:center;color:var(--sub);font-size:14px}
  footer{margin-top:46px;color:#aab2c5;font-size:13px;text-align:center}
