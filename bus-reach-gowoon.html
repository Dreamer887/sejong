<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세종 버스 무환승 도달권 — 고운동 PoC</title>
<style>
  :root{--ink:#16203a;--sub:#6b7387;--line:#e4e8f0;--blue:#2563eb;--blue-d:#1e40af;--bg:#f4f6fa}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard','Malgun Gothic',system-ui,sans-serif;color:var(--ink);background:var(--bg)}
  .wrap{display:flex;height:100vh;overflow:hidden}
  #map{flex:1;height:100%}
  .side{width:340px;flex:none;background:#fff;border-left:1px solid var(--line);display:flex;flex-direction:column}
  .side h1{font-size:16px;padding:16px 18px 6px;font-weight:800}
  .side .sub{font-size:12px;color:var(--sub);padding:0 18px 12px;line-height:1.6;border-bottom:1px solid var(--line)}
  .panel{flex:1;overflow:auto;padding:14px 18px}
  .ph{color:var(--sub);font-size:13px;line-height:1.7}
  .stat{display:flex;gap:10px;margin:4px 0 12px}
  .stat .box{flex:1;background:#f0f4ff;border:1px solid #dbe4ff;border-radius:10px;padding:10px;text-align:center}
  .stat .box b{display:block;font-size:22px;color:var(--blue-d);line-height:1.2}
  .stat .box span{font-size:11px;color:var(--sub)}
  .ttl{font-weight:800;font-size:13px;margin:14px 0 6px}
  .rline{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:5px 0;border-bottom:1px dashed #eef1f6}
  .swatch{width:14px;height:4px;border-radius:2px;flex:none}
  .ctrl{padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:8px}
  .btn{flex:1;border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px;font-size:13px;font-weight:700;cursor:pointer}
  .btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
  .keywarn{position:absolute;top:12px;left:12px;z-index:50;background:#fff3cd;border:1px solid #ffe08a;color:#7a5b00;padding:10px 14px;border-radius:10px;font-size:13px;max-width:520px;line-height:1.6;box-shadow:0 4px 16px rgba(0,0,0,.12)}
  .badge{display:inline-block;font-size:11px;font-weight:700;color:#2563eb;background:#eaf1ff;border-radius:99px;padding:2px 8px;margin-left:6px}
</style>
</head>
<body>
<div class="wrap">
  <div id="map"><div class="keywarn" id="keywarn" style="display:none"></div></div>
  <div class="side">
    <h1>버스 무환승 도달권 <span class="badge">고운동 PoC</span></h1>
    <div class="sub">단지를 클릭하면 중심 <b>500m</b> 내 정류장에서 타는 버스 노선의 전체 경로(=환승 없이 닿는 범위)를 지도에 표시합니다.</div>
    <div class="panel" id="panel"><p class="ph">왼쪽 지도에서 <b>단지 마커</b>를 클릭하세요.<br><br>· 파란 원: 500m 반경<br>· 굵은 점: 반경 내 정류장<br>· 색 선: 그 정류장들을 지나는 노선의 전체 경로</p></div>
    <div class="ctrl">
      <button class="btn" id="clearBtn">지우기</button>
      <button class="btn primary" id="fitBtn">고운동 보기</button>
    </div>
  </div>
</div>

<script>
/* ===== 설정 ===== */
const KAKAO_JS_KEY = "01636a6af4b49e1612cc9d682edb5a63";   // ← 카카오 JavaScript 키를 여기에 붙여넣으세요
const GOWOON_CENTER = {lat:36.5125, lng:127.2360};
const RADIUS_M = 500;

/* 고운동 단지 (name, num, seed[lat,lng]|null) */
const COMPLEXES = [{"name": "가락마을1단지(힐데스하임)", "num": 1, "seed": null}, {"name": "가락마을2단지", "num": 2, "seed": null}, {"name": "가락마을3단지(호반베르디움)", "num": 3, "seed": null}, {"name": "이지더원(가락마을4단지)", "num": 4, "seed": null}, {"name": "가락마을5단지(유승한내들)", "num": 5, "seed": null}, {"name": "가락마을6단지(중흥S클래스프라디움)", "num": 6, "seed": [36.502508, 127.238638]}, {"name": "가락마을7단지(중흥S-클래스프라디움)", "num": 7, "seed": [36.505386, 127.239896]}, {"name": "가락마을8단지(고운뜰아파트)", "num": 8, "seed": [36.506853, 127.240647]}, {"name": "가락마을9단지(신동아 파밀리에)", "num": 9, "seed": [36.510622, 127.229761]}, {"name": "이지더원(가락마을10단지)", "num": 10, "seed": [36.513489, 127.229519]}, {"name": "가락마을11단지(중흥에듀카운티)", "num": 11, "seed": [36.510622, 127.229761]}, {"name": "세종한림풀에버가락마을12단지", "num": 12, "seed": [36.512981, 127.23326]}, {"name": "가락마을13단지(대광로제비앙)", "num": 13, "seed": [36.513489, 127.229519]}, {"name": "가락마을14단지(우남퍼스트빌)", "num": 14, "seed": [36.512981, 127.23326]}, {"name": "가락마을15단지(중흥파크뷰)", "num": 15, "seed": null}, {"name": "가락마을16단지(에듀그린)", "num": 16, "seed": null}, {"name": "가락마을17단지(골드클래스)", "num": 17, "seed": [36.519649, 127.234696]}, {"name": "가락마을18단지", "num": 18, "seed": [36.519649, 127.234696]}, {"name": "가락마을19단지", "num": 19, "seed": null}, {"name": "가락마을 20단지(호반베르디움5차)", "num": 20, "seed": [36.516893, 127.241342]}, {"name": "가락마을21단지(에듀포레)", "num": 21, "seed": [36.517401, 127.240792]}, {"name": "가락마을22단지(에듀힐스)", "num": 22, "seed": [36.520113, 127.240844]}];

/* 노선 색상 팔레트 */
const PALETTE = ["#e6194B","#3cb44b","#4363d8","#f58231","#911eb4","#42d4f4","#f032e6","#bfa100","#9A6324","#808000","#000075","#e67c00","#2a9d8f","#c1121f","#6a4c93"];

let map, busData=null, complexMarkers=[], overlays=[], geocoder=null;

function haversine(a,b,c,d){const R=6371000,t=Math.PI/180;const dLat=(c-a)*t,dLng=(d-b)*t;const x=Math.sin(dLat/2)**2+Math.cos(a*t)*Math.cos(c*t)*Math.sin(dLng/2)**2;return 2*R*Math.asin(Math.sqrt(x));}
function clearOverlays(){overlays.forEach(o=>o.setMap(null));overlays=[];}

function loadKakao(cb){
  if(KAKAO_JS_KEY.indexOf("PASTE_")===0){
    const w=document.getElementById('keywarn');
    w.style.display='block';
    w.innerHTML='⚠ 카카오 지도 키가 필요합니다. <br>① <b>developers.kakao.com</b> → 내 애플리케이션 → 앱 생성 → <b>JavaScript 키</b> 복사<br>② [플랫폼 → Web]에 사이트 도메인 등록(로컬 테스트는 <code>http://localhost</code> / <code>file://</code> 대신 간단한 로컬서버 권장)<br>③ 이 파일 상단 <code>KAKAO_JS_KEY</code> 에 붙여넣기';
    return;
  }
  const s=document.createElement('script');
  s.src=`https://dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_JS_KEY}&libraries=services&autoload=false`;
  s.onload=()=>kakao.maps.load(cb);
  document.head.appendChild(s);
}

async function boot(){
  map=new kakao.maps.Map(document.getElementById('map'),{center:new kakao.maps.LatLng(GOWOON_CENTER.lat,GOWOON_CENTER.lng),level:5});
  geocoder=new kakao.maps.services.Places();
  busData=await fetch('./bus_sejong.json').then(r=>r.json());
  await placeComplexes();
  fitGowoon();
  document.getElementById('clearBtn').onclick=()=>{clearOverlays();document.getElementById('panel').innerHTML='<p class="ph">단지 마커를 클릭하세요.</p>';};
  document.getElementById('fitBtn').onclick=fitGowoon;
}

function geocodeOne(c){
  return new Promise(res=>{
    if(c.seed){res({lat:c.seed[0],lng:c.seed[1],via:'정류장'});return;}
    const q=c.name.replace(/\(.*?\)/g,'').trim()+' 세종';
    geocoder.keywordSearch(q,(data,status)=>{
      if(status===kakao.maps.services.Status.OK && data.length){
        // 고운동 근처로 편향
        let best=data[0],bd=1e9;
        data.forEach(d=>{const dist=haversine(GOWOON_CENTER.lat,GOWOON_CENTER.lng,+d.y,+d.x);if(dist<bd){bd=dist;best=d;}});
        if(bd<4000){res({lat:+best.y,lng:+best.x,via:'카카오'});return;}
      }
      res(null);
    },{location:new kakao.maps.LatLng(GOWOON_CENTER.lat,GOWOON_CENTER.lng),radius:5000});
  });
}

async function placeComplexes(){
  for(const c of COMPLEXES){
    const pos=await geocodeOne(c);
    if(!pos){console.warn('좌표실패',c.name);continue;}
    c.lat=pos.lat;c.lng=pos.lng;c.via=pos.via;
    const mk=new kakao.maps.Marker({position:new kakao.maps.LatLng(pos.lat,pos.lng),map,title:c.name});
    kakao.maps.event.addListener(mk,'click',()=>showComplex(c));
    complexMarkers.push(mk);
  }
}

function fitGowoon(){
  const b=new kakao.maps.LatLngBounds();
  complexMarkers.forEach(m=>b.extend(m.getPosition()));
  if(complexMarkers.length) map.setBounds(b);
}

function showComplex(c){
  clearOverlays();
  const center=new kakao.maps.LatLng(c.lat,c.lng);
  // 500m 원
  overlays.push(new kakao.maps.Circle({map,center,radius:RADIUS_M,strokeWeight:2,strokeColor:'#2563eb',strokeOpacity:.8,fillColor:'#2563eb',fillOpacity:.06}));
  // 반경 내 정류장
  const near=[];
  busData.stops.forEach((s,i)=>{const d=haversine(c.lat,c.lng,s.lat,s.lng);if(d<=RADIUS_M)near.push(i);});
  // 노선 합집합
  const routeSet=new Set();
  near.forEach(i=>busData.stops[i].r.forEach(ri=>routeSet.add(ri)));
  const routeIdxs=[...routeSet];
  // 도달 정류장 합집합
  const reach=new Set();
  routeIdxs.forEach(ri=>busData.routes[ri].seq.forEach(si=>reach.add(si)));
  // 노선 폴리라인
  routeIdxs.forEach((ri,k)=>{
    const col=PALETTE[k%PALETTE.length];
    const path=busData.routes[ri].seq.map(si=>new kakao.maps.LatLng(busData.stops[si].lat,busData.stops[si].lng));
    overlays.push(new kakao.maps.Polyline({map,path,strokeWeight:4,strokeColor:col,strokeOpacity:.65,strokeStyle:'solid'}));
  });
  // 반경 내 정류장 점
  near.forEach(i=>{const s=busData.stops[i];
    overlays.push(new kakao.maps.Circle({map,center:new kakao.maps.LatLng(s.lat,s.lng),radius:28,strokeWeight:2,strokeColor:'#111',fillColor:'#fff',fillOpacity:1}));});
  renderPanel(c,near,routeIdxs,reach.size);
}

function renderPanel(c,near,routeIdxs,reachN){
  const p=document.getElementById('panel');
  let h=`<div class="ttl" style="font-size:15px">${c.name}</div>`;
  h+=`<div class="stat"><div class="box"><b>${near.length}</b><span>500m 내 정류장</span></div><div class="box"><b>${routeIdxs.length}</b><span>경유 노선</span></div><div class="box"><b>${reachN}</b><span>무환승 도달 정류장</span></div></div>`;
  h+=`<div class="ttl">환승 없이 닿는 노선 ${routeIdxs.length}개</div>`;
  routeIdxs.forEach((ri,k)=>{const col=PALETTE[k%PALETTE.length];
    h+=`<div class="rline"><span class="swatch" style="background:${col}"></span>${busData.routes[ri].name}</div>`;});
  if(!routeIdxs.length) h+='<p class="ph">500m 내 정류장이 없습니다.</p>';
  h+=`<p class="ph" style="margin-top:10px">좌표 출처: ${c.via||'-'}</p>`;
  p.innerHTML=h;
}

loadKakao(boot);
</script>
</body>
</html>
