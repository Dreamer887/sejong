<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세종 버스 무환승 도달권 — 고운동 PoC</title>
<style>
  :root{--ink:#16203a;--sub:#6b7387;--line:#e4e8f0;--blue:#2563eb;--blue-d:#1e40af;--bg:#f4f6fa}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard','Malgun Gothic',system-ui,sans-serif;color:var(--ink);background:var(--bg)}
  .wrap{display:flex;height:100vh;overflow:hidden}
  #map{flex:1;height:100%}
  .side{width:340px;flex:none;background:#fff;border-left:1px solid var(--line);display:flex;flex-direction:column}
  .side h1{font-size:16px;padding:16px 18px 6px;font-weight:800}
  .side .sub{font-size:12px;color:var(--sub);padding:0 18px 12px;line-height:1.6;border-bottom:1px solid var(--line)}
  .panel{flex:1;overflow:auto;padding:14px 18px}
  .ph{color:var(--sub);font-size:13px;line-height:1.7}
  .stat{display:flex;gap:8px;margin:4px 0 14px}
  .stat .box{flex:1;background:#f0f4ff;border:1px solid #dbe4ff;border-radius:10px;padding:10px 6px;text-align:center}
  .stat .box b{display:block;font-size:20px;color:var(--blue-d);line-height:1.2}
  .stat .box span{font-size:10.5px;color:var(--sub)}
  .ttl{font-weight:800;font-size:13px;margin:14px 0 7px}
  .legend{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--sub);margin:2px 0 6px}
  .legend .bar{flex:1;height:12px;border-radius:6px;background:linear-gradient(90deg, rgba(29,78,216,.14), rgba(29,78,216,.66))}
  .rlist{font-size:12px;color:#475066;line-height:1.7}
  .ctrl{padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:8px}
  .btn{flex:1;border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px;font-size:13px;font-weight:700;cursor:pointer}
  .btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
  .keywarn{position:absolute;top:12px;left:12px;z-index:50;background:#fff3cd;border:1px solid #ffe08a;color:#7a5b00;padding:10px 14px;border-radius:10px;font-size:13px;max-width:520px;line-height:1.6;box-shadow:0 4px 16px rgba(0,0,0,.12)}
  .badge{display:inline-block;font-size:11px;font-weight:700;color:#2563eb;background:#eaf1ff;border-radius:99px;padding:2px 8px;margin-left:6px}
</style>
</head>
<body>
<div class="wrap">
  <div id="map"><div class="keywarn" id="keywarn" style="display:none"></div></div>
  <div class="side">
    <h1>버스 무환승 도달권 <span class="badge">고운동 PoC</span></h1>
    <div class="sub">단지를 클릭하면 중심 <b>500m</b> 내 정류장에서 환승 없이 갈 수 있는 <b>대략적 범위</b>를 음영으로 표시합니다. 여러 노선이 겹칠수록 진하게 칠해집니다.</div>
    <div class="panel" id="panel"><p class="ph">왼쪽 지도에서 <b>단지 마커</b>를 클릭하세요.<br><br>· 빨간 원: 500m 반경<br>· 음영: 환승 없이 닿는 범위 (진할수록 더 많은 노선이 지남)</p></div>
    <div class="ctrl">
      <button class="btn" id="clearBtn">지우기</button>
      <button class="btn primary" id="fitBtn">고운동 보기</button>
    </div>
  </div>
</div>

<script>
/* ===== 설정 ===== */
const KAKAO_JS_KEY = "01636a6af4b49e1612cc9d682edb5a63";
const GOWOON_CENTER = {lat:36.5125, lng:127.2360};
const RADIUS_M = 500;
/* 밀도 격자: 약 280m 셀, 노선 경로를 120m 간격으로 래스터화 */
const LAT_STEP = 0.00252, LNG_STEP = 0.00313, SAMPLE_M = 120;

/* 고운동 22개 단지 — 카카오 지오코딩 확정 좌표 [lat,lng] */
const COMPLEXES = [
{n:1,name:"가락마을1단지(힐데스하임)",lat:36.503643,lng:127.233536},
{n:2,name:"가락마을2단지",lat:36.502845,lng:127.235390},
{n:3,name:"가락마을3단지(호반베르디움)",lat:36.506168,lng:127.235988},
{n:4,name:"이지더원(가락마을4단지)",lat:36.507222,lng:127.236892},
{n:5,name:"가락마을5단지(유승한내들)",lat:36.507442,lng:127.238528},
{n:6,name:"가락마을6단지(중흥S클래스프라디움)",lat:36.503220,lng:127.239127},
{n:7,name:"가락마을7단지(중흥S-클래스프라디움)",lat:36.504596,lng:127.239645},
{n:8,name:"가락마을8단지(고운뜰아파트)",lat:36.507217,lng:127.240212},
{n:9,name:"가락마을9단지(신동아 파밀리에)",lat:36.511049,lng:127.229022},
{n:10,name:"이지더원(가락마을10단지)",lat:36.513863,lng:127.227797},
{n:11,name:"가락마을11단지(중흥에듀카운티)",lat:36.511700,lng:127.231003},
{n:12,name:"세종한림풀에버가락마을12단지",lat:36.511727,lng:127.232541},
{n:13,name:"가락마을13단지(대광로제비앙)",lat:36.513786,lng:127.230454},
{n:14,name:"가락마을14단지(우남퍼스트빌)",lat:36.513790,lng:127.232102},
{n:15,name:"가락마을15단지(중흥파크뷰)",lat:36.516701,lng:127.236999},
{n:16,name:"가락마을16단지(에듀그린)",lat:36.516118,lng:127.238610},
{n:17,name:"가락마을17단지(골드클래스)",lat:36.518037,lng:127.236574},
{n:18,name:"가락마을18단지",lat:36.521068,lng:127.235105},
{n:19,name:"가락마을19단지",lat:36.523419,lng:127.232934},
{n:20,name:"가락마을 20단지(호반베르디움5차)",lat:36.516300,lng:127.239998},
{n:21,name:"가락마을21단지(에듀포레)",lat:36.518002,lng:127.240997},
{n:22,name:"가락마을22단지(에듀힐스)",lat:36.519501,lng:127.240997}
];

let map, busData=null, complexMarkers=[], overlays=[];

function haversine(a,b,c,d){const R=6371000,t=Math.PI/180;const dLat=(c-a)*t,dLng=(d-b)*t;const x=Math.sin(dLat/2)**2+Math.cos(a*t)*Math.cos(c*t)*Math.sin(dLng/2)**2;return 2*R*Math.asin(Math.sqrt(x));}
function clearOverlays(){overlays.forEach(o=>o.setMap(null));overlays=[];}

function loadKakao(cb){
  const s=document.createElement('script');
  s.src=`https://dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_JS_KEY}&autoload=false`;
  s.onload=()=>kakao.maps.load(cb);
  s.onerror=()=>{const w=document.getElementById('keywarn');w.style.display='block';w.textContent='카카오 지도 SDK 로드 실패 — 키/도메인/카카오맵 활성화를 확인하세요.';};
  document.head.appendChild(s);
}

async function boot(){
  map=new kakao.maps.Map(document.getElementById('map'),{center:new kakao.maps.LatLng(GOWOON_CENTER.lat,GOWOON_CENTER.lng),level:5});
  busData=await fetch('./bus_sejong.json').then(r=>r.json());
  COMPLEXES.forEach(c=>{
    const mk=new kakao.maps.Marker({position:new kakao.maps.LatLng(c.lat,c.lng),map,title:c.name});
    kakao.maps.event.addListener(mk,'click',()=>showComplex(c));
    complexMarkers.push(mk);
  });
  fitGowoon();
  document.getElementById('clearBtn').onclick=()=>{clearOverlays();document.getElementById('panel').innerHTML='<p class="ph">단지 마커를 클릭하세요.</p>';};
  document.getElementById('fitBtn').onclick=fitGowoon;
}

function fitGowoon(){
  const b=new kakao.maps.LatLngBounds();
  complexMarkers.forEach(m=>b.extend(m.getPosition()));
  if(complexMarkers.length) map.setBounds(b);
}

/* 노선들을 격자에 래스터화 → 셀별 '겹치는 노선 수' */
function densityCells(routeIdxs){
  const cells={};
  routeIdxs.forEach(ri=>{
    const seq=busData.routes[ri].seq; let prev=null;
    for(const si of seq){
      const s=busData.stops[si];
      if(prev){
        const d=haversine(prev.lat,prev.lng,s.lat,s.lng);
        const n=Math.max(1,Math.ceil(d/SAMPLE_M));
        for(let k=0;k<=n;k++){
          const t=k/n, la=prev.lat+(s.lat-prev.lat)*t, ln=prev.lng+(s.lng-prev.lng)*t;
          const key=Math.floor(la/LAT_STEP)+'_'+Math.floor(ln/LNG_STEP);
          (cells[key]=cells[key]||new Set()).add(ri);
        }
      }
      prev=s;
    }
  });
  return cells;
}

function showComplex(c){
  clearOverlays();
  const center=new kakao.maps.LatLng(c.lat,c.lng);
  // 반경 내 정류장 → 노선 합집합
  const near=[];
  busData.stops.forEach((s,i)=>{ if(haversine(c.lat,c.lng,s.lat,s.lng)<=RADIUS_M) near.push(i); });
  const routeSet=new Set();
  near.forEach(i=>busData.stops[i].r.forEach(ri=>routeSet.add(ri)));
  const routeIdxs=[...routeSet];
  const reach=new Set();
  routeIdxs.forEach(ri=>busData.routes[ri].seq.forEach(si=>reach.add(si)));

  // 밀도 음영
  const cells=densityCells(routeIdxs);
  let maxC=1; for(const k in cells) if(cells[k].size>maxC) maxC=cells[k].size;
  for(const k in cells){
    const cnt=cells[k].size, p=k.split('_'), ci=+p[0], cj=+p[1];
    const sw=new kakao.maps.LatLng(ci*LAT_STEP, cj*LNG_STEP);
    const ne=new kakao.maps.LatLng((ci+1)*LAT_STEP,(cj+1)*LNG_STEP);
    const op=0.12+0.54*(cnt/maxC);
    overlays.push(new kakao.maps.Rectangle({bounds:new kakao.maps.LatLngBounds(sw,ne),fillColor:'#1d4ed8',fillOpacity:op,strokeWeight:0}));
  }
  // 500m 원 (음영 위에)
  overlays.push(new kakao.maps.Circle({map,center,radius:RADIUS_M,strokeWeight:2,strokeColor:'#e11d48',strokeOpacity:.9,fillColor:'#e11d48',fillOpacity:.05}));

  renderPanel(c,near.length,routeIdxs,reach.size,maxC);
}

function renderPanel(c,nNear,routeIdxs,reachN,maxC){
  const names=routeIdxs.map(ri=>busData.routes[ri].name.replace(/\s*\(.*$/,'')).sort();
  const p=document.getElementById('panel');
  let h=`<div class="ttl" style="font-size:15px">${c.name}</div>`;
  h+=`<div class="stat"><div class="box"><b>${nNear}</b><span>500m 내 정류장</span></div><div class="box"><b>${routeIdxs.length}</b><span>경유 노선</span></div><div class="box"><b>${reachN}</b><span>무환승 도달 정류장</span></div></div>`;
  h+=`<div class="ttl">환승 없이 닿는 범위</div>`;
  h+=`<div class="legend"><span>적음</span><span class="bar"></span><span>많음</span></div>`;
  h+=`<p class="ph" style="margin:2px 0 12px">음영이 진할수록 그 지역을 지나는 노선이 많습니다 (최대 ${maxC}개 노선 겹침).</p>`;
  if(routeIdxs.length){
    h+=`<div class="ttl">경유 노선 ${routeIdxs.length}개</div><div class="rlist">${names.join(' · ')}</div>`;
  }else{
    h+='<p class="ph">500m 내 정류장이 없습니다.</p>';
  }
  p.innerHTML=h;
}

loadKakao(boot);
</script>
</body>
</html>
