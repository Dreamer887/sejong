<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jua&display=swap">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>글쓰기 · 세종 부동산 인사이트</title>
<meta name="robots" content="noindex">
<style>
  :root{--bg:#f4f6fa;--card:#fff;--ink:#16203a;--sub:#727e98;--indigo:#5b6cff;--violet:#a06bff;--line:#e4e8f0}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6}
  .wrap{max-width:1180px;margin:0 auto;padding:0 20px 60px}
  .topbar{display:flex;align-items:center;gap:10px;padding:16px 2px;margin-bottom:10px}
  .topbar .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:16px}
  .topbar .brand i{color:#fff;background:linear-gradient(140deg,#5b6cff,#a06bff);width:30px;height:30px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;font-style:normal}
  .topbar .pill{font-size:12px;font-weight:700;color:#5b6cff;background:#eef0ff;padding:4px 11px;border-radius:99px}
  .topbar a{margin-left:auto;font-size:13px;font-weight:700;color:var(--sub);text-decoration:none}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:900px){.grid{grid-template-columns:1fr}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px 24px}
  .panel h2{font-size:15px;font-weight:800;margin-bottom:14px;color:var(--ink)}
  label{display:block;font-size:12.5px;font-weight:700;color:var(--sub);margin:14px 0 5px}
  input,select,textarea{width:100%;font-family:inherit;font-size:14px;color:var(--ink);background:#fbfcfe;border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  textarea{resize:vertical;line-height:1.7}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--indigo);background:#fff}
  .hint{font-size:11.5px;color:#aab2c5;margin-top:5px}
  .row{display:flex;gap:10px}.row>div{flex:1}
  .btn{width:100%;margin-top:18px;font-size:15px;font-weight:800;color:#fff;background:linear-gradient(135deg,#5b6cff,#a06bff);border:none;border-radius:12px;padding:13px;cursor:pointer;box-shadow:0 10px 24px -12px rgba(91,108,255,.85)}
  .btn:disabled{opacity:.55;cursor:default}
  .linkbtn{background:none;border:none;color:var(--sub);font-size:12.5px;font-weight:700;cursor:pointer;text-decoration:underline;margin-top:10px}
  .msg{margin-top:12px;font-size:13px;font-weight:700;padding:10px 12px;border-radius:10px;display:none}
  .msg.ok{display:block;background:#e1f5ee;color:#0f6e56}
  .msg.err{display:block;background:#fceaea;color:#c0392b}
  .imgbtn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--indigo);background:#eef0ff;border:none;border-radius:9px;padding:8px 13px;cursor:pointer}
  .imgbtn:disabled{opacity:.55;cursor:default}
  .rtbar{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 0}
  .rtbar button{font-size:12.5px;font-weight:700;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:8px;padding:6px 11px;cursor:pointer}
  .rtbar button:hover{background:#f3f4ff;border-color:var(--indigo)}
  .editbadge{display:inline-block;font-size:11.5px;font-weight:700;color:#9a6b00;background:#fdf3da;padding:3px 10px;border-radius:99px;margin-left:8px}
  .manage{margin-top:18px}
  .mlist{display:flex;flex-direction:column;gap:8px;margin-top:6px}
  .mrow{display:flex;align-items:center;gap:10px;background:#fbfcfe;border:1px solid var(--line);border-radius:12px;padding:11px 14px}
  .mrow .mt{flex:1;min-width:0}
  .mrow .mt b{font-size:14px;font-weight:700;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mrow .mt span{font-size:12px;color:var(--sub)}
  .mrow button{font-size:12.5px;font-weight:700;border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 12px;cursor:pointer}
  .mrow .edit{color:var(--indigo)} .mrow .del{color:#c0392b}
  .pv-tag{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;background:#eef0ff;color:var(--indigo)}
  .pv-tag.tg-analysis{color:#5b6cff;background:#eef0ff}.pv-tag.tg-trade{color:#0f6e56;background:#e1f5ee}.pv-tag.tg-price{color:#92510b;background:#faeeda}.pv-tag.tg-policy{color:#993556;background:#fbeaf0}.pv-tag.tg-brief{color:#0b6b8f;background:#e0f2f9}
  .pv h1{font-size:23px;font-weight:800;line-height:1.35;margin:11px 0 6px}
  .pv .pv-meta{color:#aab2c5;font-size:12.5px;font-weight:600}
  .pv .pv-lede{background:#f6f7ff;border:1px solid #e3e6ff;border-left:5px solid var(--indigo);border-radius:12px;padding:14px 16px;margin:14px 0 18px}
  .pv .pv-lede .a-cap{font-size:12px;font-weight:800;color:var(--indigo);margin-bottom:5px}
  .pv .pv-lede p{font-size:14px;color:#2b3550;line-height:1.7;margin:0 0 7px}
  .pv .pv-lede p:last-child{margin-bottom:0}
  .pv h2{font-size:18px;font-weight:800;margin:22px 0 9px;padding-left:11px;border-left:5px solid var(--indigo)}
  .pv h3{font-size:15px;font-weight:700;margin:16px 0 6px}
  .pv p{font-size:14.5px;color:#2b3550;margin:10px 0}
  .pv ul{margin:10px 0 10px 20px;color:#2b3550;font-size:14.5px}
  .pv .pv-summary{background:#f6f7ff;border:1px solid #e3e6ff;border-left:5px solid var(--indigo);border-radius:12px;padding:16px 18px;margin:18px 0;font-size:14px}
  .pv .pv-summary b{color:var(--indigo)}
  .pv figure{margin:14px 0}
  .pv img{max-width:100%;height:auto;display:block;border-radius:10px;border:1px solid var(--line);margin:0 auto}
  .pv figcaption{font-size:12px;color:var(--sub);text-align:center;margin-top:6px}
  .pv .big{font-size:1.2em}
  .pv strong{font-weight:800}
  .pv figure{text-align:center}
  .pv hr.a-hr{border:none;border-top:1px solid var(--line);margin:18px 0}
  .pv-lede p{margin:0 0 8px} .pv-lede p:last-child{margin-bottom:0}
  .pv-summary p{margin:6px 0 0}
  .pv .a-center{text-align:center}
  .pv .a-gap{height:0.7em}
  #pvpanel{position:sticky;top:16px;align-self:start}
  #preview{max-height:calc(100vh - 96px);overflow-y:auto}
  @media(max-width:900px){#pvpanel{position:static}#preview{max-height:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <span class="brand" onclick="location.href='../index.html'" style="cursor:pointer" title="처음으로"><svg width="48" height="48" viewBox="0 0 48 48" style="flex:none" aria-hidden="true"><defs><linearGradient id="blg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5b6cff"/><stop offset="1" stop-color="#a06bff"/></linearGradient></defs><rect width="48" height="48" rx="13" fill="url(#blg)"/><rect x="9" y="13" width="13" height="25" rx="1.6" fill="#fff"/><rect x="11.4" y="16.5" width="2.3" height="2.3" rx=".4" fill="url(#blg)"/><rect x="16.3" y="16.5" width="2.3" height="2.3" rx=".4" fill="url(#blg)"/><rect x="11.4" y="21" width="2.3" height="2.3" rx=".4" fill="url(#blg)"/><rect x="16.3" y="21" width="2.3" height="2.3" rx=".4" fill="url(#blg)"/><rect x="11.4" y="25.5" width="2.3" height="2.3" rx=".4" fill="url(#blg)"/><rect x="16.3" y="25.5" width="2.3" height="2.3" rx=".4" fill="url(#blg)"/><circle cx="31" cy="27" r="7" fill="url(#blg)" stroke="#fff" stroke-width="2.6"/><line x1="36" y1="32" x2="40.5" y2="36.5" stroke="#fff" stroke-width="3" stroke-linecap="round"/></svg><span style="display:inline-block;line-height:1"><span style="display:block;font-family:'Jua','Apple SD Gothic Neo',sans-serif;font-size:36px;letter-spacing:-1px;background:linear-gradient(120deg,#4b46c4,#9a6bf2);-webkit-background-clip:text;background-clip:text;color:transparent">세부인</span><span style="display:block;font-size:10px;font-weight:600;color:#727e98;margin-top:4px;text-align:justify;text-align-last:justify">세종 부동산 인사이트</span></span></span>
    <span class="pill">글쓰기</span>
    <a href="../blog/index.html">← 블로그 목록</a>
  </div>

  <div class="grid">
    <div class="panel">
      <h2 style="display:flex;align-items:center"><span id="formtitle">새 분석 글</span><span class="editbadge" id="editbadge">수정 중</span></h2>

      <label>패스코드</label>
      <input id="passcode" type="password" placeholder="발행용 비밀번호" autocomplete="off">
      <div class="hint">Cloudflare에 설정한 BLOG_PASSCODE 값. 입력하면 아래 '글 관리' 목록도 불러올 수 있습니다.</div>

      <div class="row">
        <div>
          <label>카테고리(태그)</label>
          <select id="tag">
            <option>거래 동향</option>
            <option>실거래 동향</option>
            <option>시세 흐름</option>
            <option>정책·공급</option>
            <option>분석</option>
          </select>
        </div>
        <div>
          <label>날짜</label>
          <input id="date" type="date">
        </div>
      </div>

      <label>제목</label>
      <input id="title" placeholder="예: 2026년 6월 세종 아파트 거래, 어디가 움직였나">

      <label>도입부 (한두 문장, 검색결과·목록 요약에 사용)</label>
      <textarea id="lede" rows="2" placeholder="이 글에서 무엇을 다루는지 간단히."></textarea>

      <label>본문</label>
      <textarea id="body" rows="14" placeholder="빈 줄로 문단을 나눕니다."></textarea>
      <div class="rtbar">
        <button type="button" data-wrap="**" title="굵게"><b>굵게</b></button>
        <button type="button" data-wrap="__" title="밑줄"><u>밑줄</u></button>
        <button type="button" data-wrap="++" title="크게">큰글씨</button>
        <button type="button" id="hrbtn" title="구분선">— 구분선</button>
        <button type="button" id="cbtn" title="가운데 정렬">가운데</button>
      </div>
      <div class="hint">엔터 친 만큼 줄이 띄워집니다 · "## " 소제목 · "### " 작은제목 · "- " 목록 · "---" 구분선 · 글자/문단 선택 후 굵게·밑줄·크게·가운데</div>
      <button type="button" class="imgbtn" id="imgbtn" style="margin-top:8px">🖼 이미지/그래프 넣기</button>
      <input type="file" id="imgfile" accept="image/png,image/jpeg,image/gif,image/webp" style="display:none">
      <div class="hint">사진·그래프 이미지를 고르면 커서 위치에 자동 삽입됩니다(5MB 이하).</div>

      <label>요약 (선택)</label>
      <textarea id="summary" rows="3" placeholder="글의 결론. 여러 줄 가능."></textarea>

      <button class="btn" id="publish">발행하기</button>
      <button class="linkbtn" id="canceledit" style="display:none">+ 수정 취소하고 새 글 작성</button>
      <div class="msg" id="msg"></div>
    </div>

    <div class="panel" id="pvpanel">
      <h2>미리보기</h2>
      <div class="pv" id="preview"></div>
    </div>
  </div>

  <div class="panel manage">
    <div style="display:flex;align-items:center;gap:10px">
      <h2 style="margin:0">발행된 글 관리</h2>
      <button class="imgbtn" id="loadlist">목록 새로고침</button>
    </div>
    <div class="mlist" id="mlist"><div style="font-size:13px;color:#aab2c5">패스코드를 입력하고 '목록 새로고침'을 누르세요.</div></div>
  </div>
</div>

<script>
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function inline(t){return t.replace(/\+\+(.+?)\+\+/g,'<span class="big">$1</span>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/__(.+?)__/g,'<u>$1</u>');}
function richLines(text){return String(text||"").replace(/\r/g,"").split("\n").map(function(l){var t=l.trim();return t===""?'<div class="a-gap"></div>':"<p>"+inline(esc(t))+"</p>";}).join("");}
function bodyToHtml(text){
  const lines=String(text||"").replace(/\r/g,"").split("\n");const out=[];let buf=[];let bufLn=0;let center=false;
  function tagln(el,ln){return el.replace(/^(<[a-zA-Z][\w-]*)/,'$1 data-ln="'+ln+'"');}
  function add(el,ln){out.push(center?'<div class="a-center" data-ln="'+ln+'">'+el+'</div>':tagln(el,ln));}
  function flush(){if(buf.length){add("<ul>"+buf.map(function(x){return "<li>"+inline(esc(x))+"</li>";}).join("")+"</ul>",bufLn);buf=[];}}
  for(let i=0;i<lines.length;i++){const line=lines[i].trim();
    if(line==="[[가운데]]"){flush();center=true;continue;}
    if(line==="[[/가운데]]"){flush();center=false;continue;}
    if(line.startsWith("- ")){if(!buf.length)bufLn=i;buf.push(line.slice(2).trim());continue;}
    flush();
    if(line===""){out.push('<div class="a-gap" data-ln="'+i+'"></div>');continue;}
    if(line==="---"||line==="***"){add('<hr class="a-hr">',i);continue;}
    const im=line.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
    if(im){const cap=im[1].trim();add('<figure class="a-fig"><img src="'+esc(im[2].trim())+'" alt="'+esc(cap)+'">'+(cap?'<figcaption>'+inline(esc(cap))+'</figcaption>':'')+'</figure>',i);continue;}
    if(line.startsWith("## ")){add("<h2>"+inline(esc(line.slice(3).trim()))+"</h2>",i);continue;}
    if(line.startsWith("### ")){add("<h3>"+inline(esc(line.slice(4).trim()))+"</h3>",i);continue;}
    if(line.startsWith("# ")){add('<p class="big">'+inline(esc(line.slice(2).trim()))+'</p>',i);continue;}
    add("<p>"+inline(esc(line))+"</p>",i);}
  flush();return out.join("\n");
}
const $=id=>document.getElementById(id);
function fmtDate(iso){if(!iso)return"";const p=iso.split("-");return p[0]+". "+(+p[1])+". "+(+p[2])+".";}
function render(){
  const tag=$("tag").value,title=$("title").value||"제목을 입력하세요",lede=$("lede").value,body=$("body").value,summary=$("summary").value,date=fmtDate($("date").value);
  let h='<span class="pv-tag '+(function(t){t=String(t||"");if(t.indexOf("실거래")>=0)return"tg-brief";if(t.indexOf("거래")>=0)return"tg-trade";if(t.indexOf("시세")>=0)return"tg-price";if(t.indexOf("정책")>=0||t.indexOf("공급")>=0)return"tg-policy";return"tg-analysis";})(tag)+'">'+esc(tag)+'</span><h1>'+esc(title)+'</h1><div class="pv-meta">'+esc(date)+' · 작성: 투자되지</div>';
  if(lede)h+='<div class="pv-lede"><div class="a-cap">들어가며</div>'+richLines(lede)+'</div>';
  h+=bodyToHtml(body);
  if(summary)h+='<div class="pv-summary"><b>한 줄 요약</b>'+richLines(summary)+'</div>';
  $("preview").innerHTML=h;
}
const now=new Date(Date.now()+9*3600*1000);
$("date").value=now.toISOString().slice(0,10);
["tag","title","lede","body","summary","date"].forEach(id=>$(id).addEventListener("input",render));
render();

let POSTS=[],editId=null;
function setMode(){
  $("formtitle").textContent=editId?"글 수정 중":"새 분석 글";
  $("editbadge").style.display=editId?"inline-block":"none";
  $("publish").textContent=editId?"수정 저장":"발행하기";
  $("canceledit").style.display=editId?"inline-block":"none";
}
function clearForm(){$("title").value="";$("lede").value="";$("body").value="";$("summary").value="";render();}
$("canceledit").addEventListener("click",function(){editId=null;clearForm();setMode();window.scrollTo(0,0);});

async function api(payload){
  const r=await fetch("/api/publish-post",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
  const j=await r.json();if(!r.ok)throw new Error(j.error||("오류 "+r.status));return j;
}
function listInfo(t){$("mlist").innerHTML='<div style="font-size:13px;color:#aab2c5">'+t+'</div>';}
function renderList(){
  if(!POSTS.length){listInfo("발행된 글이 없습니다.");return;}
  const sorted=POSTS.slice().sort((a,b)=>(b.dateISO||"").localeCompare(a.dateISO||""));
  $("mlist").innerHTML=sorted.map(function(p){
    return '<div class="mrow"><div class="mt"><b>'+esc(p.title)+'</b><span>'+esc(p.tag||"")+' · '+esc(p.dateText||"")+'</span></div>'+
      '<button class="edit" data-id="'+esc(p.id)+'">수정</button>'+
      '<button class="del" data-id="'+esc(p.id)+'">삭제</button></div>';
  }).join("");
  Array.prototype.forEach.call($("mlist").querySelectorAll(".edit"),function(b){
    b.addEventListener("click",function(){
      const p=POSTS.filter(function(x){return x.id===b.dataset.id;})[0];if(!p)return;
      editId=p.id;$("tag").value=p.tag||"분석";$("date").value=p.dateISO||"";$("title").value=p.title||"";
      $("lede").value=p.lede||"";$("body").value=p.body||"";$("summary").value=p.summary||"";
      render();setMode();window.scrollTo(0,0);
    });
  });
  Array.prototype.forEach.call($("mlist").querySelectorAll(".del"),function(b){
    b.addEventListener("click",async function(){
      const p=POSTS.filter(function(x){return x.id===b.dataset.id;})[0];if(!p)return;
      if(!confirm('"'+p.title+'" 글을 삭제할까요? 되돌릴 수 없습니다.'))return;
      b.disabled=true;
      try{await api({action:"delete",passcode:$("passcode").value,id:p.id});
        if(editId===p.id){editId=null;clearForm();setMode();}
        await loadList();
      }catch(e){alert("삭제 실패: "+e.message);b.disabled=false;}
    });
  });
}
async function loadList(){
  const pc=$("passcode").value;if(!pc){listInfo("패스코드를 먼저 입력하세요.");return;}
  const btn=$("loadlist");btn.disabled=true;btn.textContent="불러오는 중…";
  try{const j=await api({action:"list",passcode:pc});POSTS=j.posts||[];renderList();}
  catch(e){listInfo("목록 불러오기 실패: "+e.message);}
  finally{btn.disabled=false;btn.textContent="목록 새로고침";}
}
$("loadlist").addEventListener("click",loadList);

function wrapSel(mark){
  const ta=$("body"),s=ta.selectionStart,e=ta.selectionEnd,v=ta.value,top=ta.scrollTop;
  const sel=v.slice(s,e)||"텍스트";
  ta.value=v.slice(0,s)+mark+sel+mark+v.slice(e);
  ta.focus();ta.selectionStart=s+mark.length;ta.selectionEnd=s+mark.length+sel.length;ta.scrollTop=top;render();
}
Array.prototype.forEach.call(document.querySelectorAll(".rtbar [data-wrap]"),function(b){b.addEventListener("click",function(){wrapSel(b.dataset.wrap);});});
$("hrbtn").addEventListener("click",function(){
  const ta=$("body"),s=ta.selectionStart,v=ta.value,t="\n---\n",top=ta.scrollTop;
  ta.value=v.slice(0,s)+t+v.slice(s);ta.focus();ta.selectionStart=ta.selectionEnd=s+t.length;ta.scrollTop=top;render();
});
$("cbtn").addEventListener("click",function(){
  const ta=$("body"),s=ta.selectionStart,e=ta.selectionEnd,v=ta.value,top=ta.scrollTop;
  const sel=v.slice(s,e)||"가운데 정렬할 내용";
  const block="\n[[가운데]]\n"+sel+"\n[[/가운데]]\n";
  ta.value=v.slice(0,s)+block+v.slice(e);ta.focus();ta.selectionStart=ta.selectionEnd=s+block.length;ta.scrollTop=top;render();
});
$("imgbtn").addEventListener("click",function(){
  if(!$("passcode").value){const m=$("msg");m.className="msg err";m.textContent="이미지 업로드 전에 패스코드를 먼저 입력하세요.";return;}
  $("imgfile").click();
});
$("imgfile").addEventListener("change",async function(e){
  const file=e.target.files[0];if(!file)return;
  const msg=$("msg"),btn=$("imgbtn");
  if(file.size>5*1024*1024){msg.className="msg err";msg.textContent="이미지는 5MB 이하만 가능합니다.";e.target.value="";return;}
  btn.disabled=true;btn.textContent="업로드 중…";msg.className="msg";msg.textContent="";
  try{
    const dataUrl=await new Promise(function(res,rej){const r=new FileReader();r.onload=function(){res(r.result);};r.onerror=rej;r.readAsDataURL(file);});
    const j=await fetch("/api/upload-image",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({passcode:$("passcode").value,dataUrl:dataUrl})}).then(function(r){return r.json().then(function(j){if(!r.ok)throw new Error(j.error||("오류 "+r.status));return j;});});
    const ta=$("body"),top=ta.scrollTop,pos=(ta.selectionStart!=null?ta.selectionStart:ta.value.length);
    const snippet="\n\n![캡션을 입력하세요]("+j.url+")\n\n";
    ta.value=ta.value.slice(0,pos)+snippet+ta.value.slice(pos);ta.focus();ta.selectionStart=ta.selectionEnd=pos+snippet.length;ta.scrollTop=top;
    render();
    msg.className="msg ok";msg.textContent="이미지 삽입됨! 본문에서 '캡션을 입력하세요'를 원하는 설명으로 바꾸세요.";
  }catch(err){msg.className="msg err";msg.textContent="이미지 업로드 실패: "+err.message;}
  finally{btn.disabled=false;btn.textContent="🖼 이미지/그래프 넣기";e.target.value="";}
});

$("publish").addEventListener("click",async function(){
  const msg=$("msg");msg.className="msg";msg.textContent="";
  const payload={
    action:editId?"update":"create",id:editId||undefined,
    passcode:$("passcode").value,tag:$("tag").value,title:$("title").value.trim(),
    lede:$("lede").value.trim(),body:$("body").value,summary:$("summary").value.trim(),
    dateISO:$("date").value,dateText:fmtDate($("date").value)
  };
  if(!payload.passcode){msg.className="msg err";msg.textContent="패스코드를 입력하세요.";return;}
  if(!payload.title||!payload.body){msg.className="msg err";msg.textContent="제목과 본문은 필수입니다.";return;}
  const btn=$("publish");btn.disabled=true;btn.textContent=editId?"저장 중…":"발행 중…";
  try{
    const j=await api(payload);
    msg.className="msg ok";msg.innerHTML=(editId?"수정 저장 완료! ":"발행 완료! ")+'1~2분 뒤 사이트에 반영됩니다. <a href="'+j.url+'" target="_blank">글 보기 ↗</a>';
    editId=null;clearForm();setMode();
    loadList();
  }catch(e){
    msg.className="msg err";msg.textContent=(editId?"저장 실패: ":"발행 실패: ")+e.message;
  }finally{btn.disabled=false;setMode();}
});
</script>
